<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4f46e5">
  <title>ShopPinkki - LLM 테스트</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script>
    window.MAP_RESOLUTION = 0.05;
    window.MAP_ORIGIN_X   = -0.1;
    window.MAP_ORIGIN_Y   = -0.1;
    window.MAP_IMAGE_URL  = "/static/map/shop.png";
    window.ROBOT_ID       = "TEST";
    window.__SHOPPINKKI_WAITING_TIMEOUT_SEC__ = 300;
    window.IS_LLM_TEST_MODE = true;
  </script>
</head>
<body>
<div class="app-container">

  <!-- ─────────────────────────────────────────────────────────────
       3-A. 공통 상단 바
  ───────────────────────────────────────────────────────────── -->
  <header class="top-bar">
    <span class="robot-label">🤖 LLM 테스트</span>
    <span id="mode-badge" class="badge badge-TRACKING">상품 검색 중</span>
    <span id="ctrl-status" style="font-size:12px; color:var(--success); margin-left:auto;">✓ LLM 준비</span>
  </header>

  <!-- ─────────────────────────────────────────────────────────────
       3-C. 메인 쇼핑 패널 (mode=TRACKING / TRACKING_CHECKOUT / WAITING)
  ───────────────────────────────────────────────────────────── -->
  <div id="panel-shopping" class="panel">
    <!-- 액션 버튼 -->
    <div class="card" style="padding-bottom: 12px;">
      <div class="btn-group">
        <button class="btn btn-outline" onclick="openFindPanel()">🔍 상품 찾기</button>
        <button class="btn btn-outline" onclick="openQrPanel()" style="opacity:0.5; cursor:not-allowed;" disabled>📦 담기</button>
      </div>
    </div>

    <!-- 장바구니 -->
    <div class="card">
      <div class="card-title">🛒 검색 결과</div>
      <div id="search-result-area" style="min-height:100px; padding:12px; background:#f9fafb; border-radius:8px; border:1px dashed #e2e8f0;">
        <p style="color:var(--text-muted); font-size:13px; text-align:center;">상품을 검색해주세요</p>
      </div>
    </div>

    <!-- 하단 조작 버튼 -->
    <div class="card" style="padding-top: 12px;">
      <div class="btn-group">
        <button class="btn btn-outline" style="opacity:0.5; cursor:not-allowed;" disabled>⏸ 대기하기</button>
        <button class="btn btn-danger" style="opacity:0.5; cursor:not-allowed;" disabled>🚪 종료</button>
      </div>
      <p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top:12px;">
        💡 LLM 상품 검색 데모 | control_service 연결 불필요
      </p>
    </div>
  </div>

</div><!-- /.app-container -->

<!-- ─────────────────────────────────────────────────────────────
     3-D. 상품 검색 오버레이 (LLM 전용)
───────────────────────────────────────────────────────────── -->
<div id="find-overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-label="상품 검색">
  <div class="overlay-box">
    <div class="overlay-title">🔍 상품 검색</div>
    <div class="search-row">
      <input
        id="find-input"
        class="form-control"
        type="text"
        placeholder="찾으시는 상품을 입력하세요"
        onkeydown="if(event.key==='Enter') submitFind()"
        autocomplete="off"
      >
      <button id="btn-search-spinner" class="btn-mic" style="cursor:wait; opacity:0.6;" disabled>⏳</button>
    </div>
    <div id="find-result" class="search-result"></div>

    <!-- 지도 미리보기 프리뷰 영역 (Placeholder) -->
    <div id="find-map-preview" class="map-preview-small hidden">
      <div class="map-placeholder-content">
        <span class="map-icon">📍</span>
        <span class="map-text">안내 경로 탐색 중...</span>
      </div>
    </div>

    <!-- 기존 버튼 그룹을 재사용 (상황에 따라 글자/기능 변경) -->
    <div class="btn-group" style="margin-top: 14px;">
      <button id="btn-find-primary" class="btn btn-primary" onclick="submitFind()">검색</button>
      <button id="btn-find-secondary" class="btn btn-outline" onclick="closeFindPanel()">닫기</button>
    </div>
  </div>
</div>

<!-- 기타 오버레이 (비활성, UI 호환성용) -->
<div id="qr-overlay" class="overlay hidden" style="display:none;"></div>
<div id="checkout-modal" class="modal-backdrop hidden" style="display:none;"></div>
<div id="arrived-modal" class="modal-backdrop hidden" style="display:none;"></div>
<div id="map-overlay" class="map-overlay hidden" style="display:none;"></div>
<div id="panel-locked" class="panel" style="display:none;"></div>
<div id="panel-charging" class="panel" style="display:none;"></div>
<div id="panel-halted" class="panel" style="display:none;"></div>

<!-- ── 토스트 컨테이너 ── -->
<div id="toast-container" aria-live="polite"></div>

<!-- ── 스크립트 ─────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"
        crossorigin="anonymous"></script>
<script>
  // ── UI 함수 (socket.js 호환성) ────────────────────────

  function openFindPanel() {
    document.getElementById('find-overlay').classList.remove('hidden');
    document.getElementById('find-input').focus();
  }

  function closeFindPanel() {
    document.getElementById('find-overlay').classList.add('hidden');
    document.getElementById('find-result').innerHTML = '';
  }

  function openQrPanel() {
    alert('이 테스트 모드에서는 사용 불가능합니다.');
  }

  function closeQrPanel() {}

  function openMapOverlay() {
    alert('이 테스트 모드에서는 맵을 사용할 수 없습니다.');
  }

  function closeMapOverlay() {}

  function requestReturn() {
    alert('이 테스트 모드에서는 사용 불가능합니다.');
  }

  // ── 검색 함수 ────────────────────────────────────────

  async function submitFind() {
    const input = document.getElementById('find-input');
    const query = input.value.trim();

    if (!query) {
      alert('상품명을 입력해주세요.');
      return;
    }

    const resultDiv = document.getElementById('find-result');
    const spinner = document.getElementById('btn-search-spinner');
    const primaryBtn = document.getElementById('btn-find-primary');

    resultDiv.innerHTML = '<p style="text-align:center; color:var(--text-muted);">검색 중...</p>';
    spinner.disabled = true;
    primaryBtn.disabled = true;

    try {
      const res = await fetch('/api/llm_test', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: query })
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        resultDiv.innerHTML = `
          <div style="padding:16px; background:#fee2e2; border-radius:8px; border-left:4px solid #dc2626;">
            <p style="color:#991b1b; font-weight:500;">❌ 검색 실패</p>
            <p style="color:#7f1d1d; font-size:13px; margin-top:4px;">${data.error || '알 수 없는 오류'}</p>
          </div>
        `;
      } else {
        const answer = data.answer || `${data.zone_name}으로 안내합니다.`;
        resultDiv.innerHTML = `
          <div style="padding:16px; background:#ecfdf5; border-radius:8px; border-left:4px solid #22c55e;">
            <p style="color:#15803d; font-weight:500; margin-bottom:8px;">✓ 검색 결과</p>
            <p style="color:#166534; margin-bottom:8px;">
              <strong style="font-size:16px;">${data.display_name || data.zone_name}</strong>
            </p>
            <p style="color:#166534; font-size:13px; line-height:1.5;">${answer}</p>
            <p style="color:#15803d; font-size:12px; margin-top:12px; padding-top:12px; border-top:1px solid #86efac;">
              구역 ID: ${data.zone_id}
            </p>
          </div>
        `;

        // 메인 화면에도 결과 표시
        document.getElementById('search-result-area').innerHTML = `
          <div style="padding:12px; background:#e0f2fe; border-radius:6px;">
            <p style="font-weight:600; color:#0369a1; margin-bottom:4px;">🎯 검색 완료</p>
            <p style="color:#075985; font-size:13px;">"${query}" → <strong>${data.display_name || data.zone_name}</strong></p>
          </div>
        `;
      }
    } catch (err) {
      resultDiv.innerHTML = `
        <div style="padding:16px; background:#fee2e2; border-radius:8px; border-left:4px solid #dc2626;">
          <p style="color:#991b1b; font-weight:500;">❌ 요청 실패</p>
          <p style="color:#7f1d1d; font-size:13px; margin-top:4px;">${err.message}</p>
        </div>
      `;
    } finally {
      spinner.disabled = false;
      primaryBtn.disabled = false;
    }
  }

  // ── 엔터키 처리 ────────────────────────────────────────
  document.getElementById('find-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      submitFind();
    }
  });

  // ── 페이지 로드 시 초기화 ────────────────────────────
  window.addEventListener('load', () => {
    console.log('🚀 LLM 테스트 모드 준비 완료');
    console.log('💡 팁: "콜라", "우유", "초콜릿" 등을 검색해보세요.');
  });
</script>
</body>
</html>
