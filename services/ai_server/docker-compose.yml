version: '3.9'

# ShopPinkki AI Server
#
# 서비스:
#   yolo — TCP:5005 YOLOv8 인형 감지 추론 서버 (채널 F)
#   llm  — REST:8000 자연어 상품 위치 검색 서버 (채널 D)
#
# 실행:
#   cd services/ai_server
#   docker compose up
#
# 환경 변수 (.env 파일 또는 shell export):
#   PG_HOST     (llm 서버용, 기본 host.docker.internal)
#   PG_PORT     (기본 5432)
#   PG_USER     (기본 shoppinkki)
#   PG_PASSWORD (기본 shoppinkki)
#   PG_DATABASE (기본 shoppinkki)

services:
  yolo:
    build:
      context: ./yolo
      dockerfile: Dockerfile
    container_name: shoppinkki_yolo
    ports:
      - "5005:5005"
    volumes:
      - ./yolo/models:/app/models:ro
    environment:
      - MODEL_PATH=/app/models/best.pt
      - FALLBACK_MODEL=yolov8n.pt
      - YOLO_CONFIDENCE=0.25
      - YOLO_CLASS_FILTER=           # 빈 문자열 → 전체 클래스 허용 (custom model은 1클래스)
      - HOST=0.0.0.0
      - PORT=5005
    restart: unless-stopped

  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile
    container_name: shoppinkki_llm
    network_mode: "host"
    environment:
      - PG_HOST=${PG_HOST:-127.0.0.1}
      - PG_PORT=${PG_PORT:-5432}
      - PG_USER=${PG_USER:-shoppinkki}
      - PG_PASSWORD=${PG_PASSWORD:-shoppinkki}
      - PG_DATABASE=${PG_DATABASE:-shoppinkki}
      - HOST=0.0.0.0
      - PORT=8000
      - OLLAMA_URL=http://127.0.0.1:11434/api/generate
      - OLLAMA_MODEL=qwen2.5:3b
    restart: unless-stopped
