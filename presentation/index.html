<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쑈삥끼 — 스마트 쇼핑 카트</title>

  <!-- Preconnect for faster CDN resolution -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.prismic.io">

  <!-- Reveal.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css" id="theme">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Great+Vibes&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      prefix: '',
      important: true,
      corePlugins: { preflight: false },
      safelist: [
        // ── 레이아웃 ──
        'block', 'inline', 'inline-block', 'hidden',
        'flex', 'inline-flex', 'grid', 'inline-grid',
        'flex-row', 'flex-col', 'flex-row-reverse', 'flex-col-reverse',
        'flex-wrap', 'flex-nowrap', 'flex-wrap-reverse',
        'flex-1', 'flex-auto', 'flex-initial', 'flex-none',
        'flex-shrink', 'flex-shrink-0', 'flex-grow', 'flex-grow-0',
        'shrink', 'shrink-0', 'grow', 'grow-0',
        'grid-cols-1', 'grid-cols-2', 'grid-cols-3', 'grid-cols-4',
        'grid-cols-5', 'grid-cols-6', 'grid-cols-7', 'grid-cols-8',
        'grid-rows-1', 'grid-rows-2', 'grid-rows-3', 'grid-rows-4',
        'col-span-1', 'col-span-2', 'col-span-3', 'col-span-4',
        'col-span-5', 'col-span-6', 'col-span-full',
        'row-span-1', 'row-span-2', 'row-span-3', 'row-span-full',
        // ── 정렬 ──
        'items-start', 'items-center', 'items-end', 'items-stretch', 'items-baseline',
        'justify-start', 'justify-center', 'justify-end',
        'justify-between', 'justify-around', 'justify-evenly',
        'content-start', 'content-center', 'content-end',
        'content-between', 'content-around', 'content-evenly',
        'self-auto', 'self-start', 'self-center', 'self-end', 'self-stretch',
        'place-items-center', 'place-content-center',
        // ── 포지션 ──
        'static', 'relative', 'absolute', 'fixed', 'sticky',
        'inset-0', 'inset-x-0', 'inset-y-0',
        'top-0', 'bottom-0', 'left-0', 'right-0',
        'z-0', 'z-10', 'z-20', 'z-30', 'z-40', 'z-50',
        // ── 오버플로우 ──
        'overflow-hidden', 'overflow-auto', 'overflow-scroll',
        'overflow-visible', 'overflow-x-hidden', 'overflow-y-hidden',
        'overflow-x-auto', 'overflow-y-auto',
        // ── 텍스트 스타일 ──
        'italic', 'not-italic',
        'uppercase', 'lowercase', 'capitalize', 'normal-case',
        'underline', 'overline', 'line-through', 'no-underline',
        'text-left', 'text-center', 'text-right', 'text-justify',
        'truncate', 'text-ellipsis', 'text-clip',
        'whitespace-normal', 'whitespace-nowrap', 'whitespace-pre',
        'break-normal', 'break-words', 'break-all', 'break-keep',
        // ── 표준 텍스트 크기 (rem 기반) ──
        'text-xs', 'text-sm', 'text-base', 'text-lg',
        'text-xl', 'text-2xl', 'text-3xl', 'text-4xl',
        'text-5xl', 'text-6xl', 'text-7xl', 'text-8xl', 'text-9xl',
        // ── em 기반 텍스트 크기 (Reveal.js 비례 스케일) ──
        'text-em-3xs', 'text-em-2xs', 'text-em-xs', 'text-em-sm',
        'text-em-md',  'text-em-lg',  'text-em-xl',
        'text-em-2xl', 'text-em-3xl', 'text-em-4xl',
        'text-em-5xl', 'text-em-6xl', 'text-em-7xl', 'text-em-8xl', 'text-em-9xl', 'text-em-10xl',
        // ── 폰트 굵기 ──
        'font-thin', 'font-extralight', 'font-light', 'font-normal',
        'font-medium', 'font-semibold', 'font-bold', 'font-extrabold', 'font-black',
        // ── 자간 / 줄간격 ──
        'tracking-tighter', 'tracking-tight', 'tracking-normal',
        'tracking-wide', 'tracking-wider', 'tracking-widest',
        'leading-none', 'leading-tight', 'leading-snug', 'leading-normal',
        'leading-relaxed', 'leading-loose',
        // ── 그림자 ──
        'shadow', 'shadow-sm', 'shadow-md', 'shadow-lg', 'shadow-xl', 'shadow-2xl', 'shadow-none',
        'drop-shadow', 'drop-shadow-sm', 'drop-shadow-md', 'drop-shadow-lg', 'drop-shadow-xl',
        // ── 불투명도 ──
        'opacity-0', 'opacity-5', 'opacity-10', 'opacity-20', 'opacity-25',
        'opacity-30', 'opacity-40', 'opacity-50', 'opacity-60',
        'opacity-70', 'opacity-75', 'opacity-80', 'opacity-90', 'opacity-95', 'opacity-100',
        // ── 트랜지션 ──
        'transition', 'transition-all', 'transition-colors',
        'duration-75', 'duration-100', 'duration-150', 'duration-200',
        'duration-300', 'duration-500', 'duration-700', 'duration-1000',
        'ease-linear', 'ease-in', 'ease-out', 'ease-in-out',
        // ── 기타 ──
        'cursor-pointer', 'cursor-default', 'cursor-not-allowed',
        'select-none', 'select-text', 'select-all',
        'visible', 'invisible', 'pointer-events-none', 'pointer-events-auto',
        'object-cover', 'object-contain', 'object-fill',
        'aspect-auto', 'aspect-square', 'aspect-video',
      ],
      theme: {
        extend: {
          colors: {
            md: {
              primary:           '#38BDF8',
              'on-primary':      '#0A1628',
              'primary-ctr':     '#0E2840',
              'on-primary-ctr':  '#BAE6FD',
              secondary:         '#7BA5C8',
              'secondary-ctr':   '#0D1F33',
              tertiary:          '#A78BFA',
              'tertiary-ctr':    '#1C1040',
              surface:           '#0A1628',
              'surface-ctr':     '#112236',
              'surface-ctr-hi':  '#1A3050',
              'on-surface':      '#E2EEFF',
              'on-surface-var':  '#7BA5C8',
              outline:           '#3A5A7A',
              'outline-var':     '#2A4A6A',
              error:             '#F87171',
              'error-ctr':       '#2D1010',
              green:             '#34D399',
              'green-ctr':       '#082516',
              amber:             '#FBBF24',
              'amber-ctr':       '#2A1800',
            }
          },
          fontFamily: {
            sans: ['"Noto Sans KR"', 'Roboto', 'sans-serif'],
          },
          // ── em 기반 커스텀 텍스트 크기 ──
          // section 기준(~40px)으로 설계된 em 스케일
          // 용도: text-em-xs, text-em-sm ... text-em-8xl
          fontSize: {
            'em-3xs':  ['0.42em', { lineHeight: '1.4' }],  // 17px — 라벨 태그 (TECHNOLOGY 등)
            'em-2xs':  ['0.48em', { lineHeight: '1.4' }],  // 19px — 작은 설명
            'em-xs':   ['0.55em', { lineHeight: '1.4' }],  // 22px — 섹션 카테고리 레이블
            'em-sm':   ['0.6em',  { lineHeight: '1.5' }],  // 24px — 카드 컨테이너 기준
            'em-md':   ['0.75em', { lineHeight: '1.5' }],  // 30px — 중간 텍스트
            'em-lg':   ['0.85em', { lineHeight: '1.4' }],  // 34px — 카드 타이틀
            'em-xl':   ['1em',    { lineHeight: '1.4' }],  // 40px — 기본 크기 / 아이콘 (컨테이너 내)
            'em-2xl':  ['1.2em',  { lineHeight: '1.3' }],  // 48px — UI 화살표
            'em-3xl':  ['1.4em',  { lineHeight: '1.2' }],  // 56px — section h2 제목
            'em-4xl':  ['1.6em',  { lineHeight: '1.1' }],  // 64px — 결제 화살표
            'em-5xl':  ['1.8em',  { lineHeight: '1' }],    // 72px — 파이프라인 아이콘 래퍼
            'em-6xl':  ['2em',    { lineHeight: '1' }],    // 80px — UX 단계 아이콘
            'em-7xl':  ['2.5em',  { lineHeight: '1' }],    // 100px — 상태머신 아이콘
            'em-8xl':  ['3em',    { lineHeight: '1' }],    // 120px — 대형
            'em-9xl':  ['4em',    { lineHeight: '1' }],    // 160px — 타이틀 최대
            'em-10xl': ['5em',    { lineHeight: '1' }],    // 200px — 타이틀 초대형
          },
          boxShadow: {
            'md1': '0 1px 3px 1px rgba(0,0,0,.08), 0 1px 2px 0 rgba(0,0,0,.1)',
            'md2': '0 2px 6px 2px rgba(0,0,0,.08), 0 1px 2px 0 rgba(0,0,0,.1)',
            'md3': '0 4px 8px 3px rgba(0,0,0,.08), 0 1px 3px 0 rgba(0,0,0,.1)',
          }
        }
      }
    }
  </script>

  <!-- Reveal.js overrides only -->
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen" style="position:fixed;inset:0;z-index:9999;background:#0A1628;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:'Noto Sans KR',sans-serif">
  <div style="font-size:2.4rem;font-weight:900;color:#E2EEFF;letter-spacing:-0.02em">쑈삥끼</div>
  <div style="display:flex;gap:8px;align-items:center">
    <div style="width:6px;height:6px;border-radius:50%;background:#38BDF8;animation:ld 1s ease-in-out infinite 0s"></div>
    <div style="width:6px;height:6px;border-radius:50%;background:#38BDF8;animation:ld 1s ease-in-out infinite 0.15s"></div>
    <div style="width:6px;height:6px;border-radius:50%;background:#38BDF8;animation:ld 1s ease-in-out infinite 0.3s"></div>
  </div>
  <style>
    @keyframes ld { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }
  </style>
</div>

<div class="reveal">
  <div class="slides">
    <!-- Slides are loaded dynamically by js/main.js -->
  </div>
</div>

<!-- Slide Panel (right sidebar) -->
<div id="slide-panel" class="hidden fixed top-0 right-0 h-full z-[150] font-sans flex-col" style="width:240px;background:#0D1E33;border-left:1px solid #1E3A5A;box-shadow:-8px 0 32px rgba(0,0,0,0.6)">
  <div class="flex items-center justify-between px-4 py-3 shrink-0" style="border-bottom:1px solid #1E3A5A">
    <span class="font-bold text-sm" style="color:#E2EEFF">슬라이드 목록</span>
    <button onclick="closeSlidePanel()" style="color:#7BA5C8;font-size:16px;line-height:1;background:none;border:none;cursor:pointer">✕</button>
  </div>
  <div id="slide-panel-list" class="flex-1 overflow-y-auto py-2 flex flex-col gap-1 px-2"></div>
</div>
<div id="fullscreen-hint" style="position:fixed;bottom:12px;left:14px;z-index:50;background:rgba(10,22,40,0.85);color:#3A5A7A;border-radius:8px;padding:4px 10px;font-size:11px;border:1px solid #1E3A5A;font-family:'Noto Sans KR',sans-serif;pointer-events:none;transition:opacity 0.3s">Press <kbd style="background:#112236;border:1px solid #1E3A5A;border-radius:4px;padding:1px 5px;font-size:0.9em;color:#7BA5C8">F</kbd> for fullscreen</div>
<div id="slide-panel-overlay" class="hidden fixed inset-0 z-[149]" onclick="closeSlidePanel()"></div>


<!-- Reveal.js + plugins -->
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>

<!-- Presentation logic -->
<script>document.write('<script src="js/main.js?v=' + Date.now() + '"><\/script>');</script>

</body>
</html>
