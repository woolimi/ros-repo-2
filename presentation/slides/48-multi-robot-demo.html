<section class="flex flex-col">
  <h2 class="text-em-xl font-black text-md-primary mt-0 mb-6 text-center w-full">가이드 Demo <span class="text-em-sm font-bold" style="color:#8BACC8">— 로봇 2대</span></h2>
  <div class="flex-1 flex flex-col gap-2 w-full">
    <div class="flex-1 flex justify-center items-center">
      <video
        id="multi-robot-demo-video"
        src="https://woolimi.cdn.prismic.io/woolimi/aeE_Yp1ZCF7ETQ_R_guiding-54.mp4"
        style="max-height:540px;max-width:100%;display:block;background:transparent"
        autoplay loop muted playsinline
        onloadedmetadata="this.playbackRate=1.0"
        onclick="this.paused ? this.play() : this.pause()">
      </video>
    </div>
    <div data-video-controls="multi-robot-demo-video"></div>
  </div>
</section>
