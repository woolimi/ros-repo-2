<section class="!items-center !justify-center overflow-hidden" style="background:#000">

<style>
  @keyframes rainbow {
    0%{color:#ff0000}8%{color:#ff4400}16%{color:#ff8800}24%{color:#ffcc00}
    32%{color:#ffff00}40%{color:#aaff00}48%{color:#00ff00}56%{color:#00ffaa}
    64%{color:#00ffff}72%{color:#0088ff}80%{color:#8800ff}88%{color:#ff00ff}100%{color:#ff0000}
  }
  @keyframes superBounce {
    0%,100%{transform:translateY(0) scale(1) rotate(0deg)}
    10%{transform:translateY(-80px) scale(1.2) rotate(-6deg)}
    20%{transform:translateY(10px) scale(0.85) rotate(5deg)}
    30%{transform:translateY(-50px) scale(1.15) rotate(-4deg)}
    40%{transform:translateY(5px) scale(0.92) rotate(3deg)}
    50%{transform:translateY(-30px) scale(1.08) rotate(-2deg)}
    60%{transform:translateY(3px) scale(0.96) rotate(2deg)}
    70%{transform:translateY(-15px) scale(1.04) rotate(-1deg)}
    80%{transform:translateY(2px) scale(0.98) rotate(1deg)}
  }
  @keyframes bgFlash {
    0%{background:#ff000044}5%{background:#00ff0044}10%{background:#0000ff44}
    15%{background:#ffff0044}20%{background:#ff00ff44}25%{background:#00ffff44}
    30%{background:#ff880044}35%{background:#000}40%{background:#ff000044}
    45%{background:#00ff8844}50%{background:#000}55%{background:#ff00ff44}
    60%{background:#ffff0044}65%{background:#000}70%{background:#00ffff44}
    75%{background:#ff444444}80%{background:#000}85%{background:#44ff4444}
    90%{background:#4444ff44}95%{background:#000}100%{background:#ff000044}
  }
  @keyframes starFloat {
    0%{transform:translateY(110%) rotate(0deg);opacity:1}
    100%{transform:translateY(-110%) rotate(1080deg);opacity:0}
  }
  @keyframes sideFloat {
    0%{transform:translateX(-110%) rotate(0deg);opacity:1}
    100%{transform:translateX(110%) rotate(720deg);opacity:0}
  }
  @keyframes subtitleBlink {
    0%,30%,32%,64%,66%,100%{opacity:1}
    31%,65%{opacity:0}
  }
  @keyframes shake {
    0%{transform:translate(0,0) rotate(0deg)}
    5%{transform:translate(-12px,-8px) rotate(-2deg)}
    10%{transform:translate(12px,8px) rotate(2deg)}
    15%{transform:translate(-10px,6px) rotate(-1.5deg)}
    20%{transform:translate(10px,-6px) rotate(1.5deg)}
    25%{transform:translate(-8px,4px) rotate(-1deg)}
    30%{transform:translate(8px,-4px) rotate(1deg)}
    35%{transform:translate(-6px,2px) rotate(-0.5deg)}
    40%{transform:translate(6px,-2px) rotate(0.5deg)}
    45%{transform:translate(-4px,1px) rotate(-0.3deg)}
    50%{transform:translate(4px,-1px) rotate(0.3deg)}
    55%{transform:translate(-12px,8px) rotate(-2deg)}
    60%{transform:translate(12px,-8px) rotate(2deg)}
    100%{transform:translate(0,0) rotate(0deg)}
  }
  @keyframes glitter {
    0%,100%{opacity:0;transform:scale(0) rotate(0deg)}
    40%{opacity:1;transform:scale(1.3) rotate(270deg)}
    60%{opacity:1;transform:scale(0.8) rotate(180deg)}
  }
  @keyframes borderRainbow {
    0%{border-color:#ff0000;box-shadow:0 0 40px #ff0000,0 0 80px #ff000060,inset 0 0 30px #ff000020}
    16%{border-color:#ff8800;box-shadow:0 0 40px #ff8800,0 0 80px #ff880060,inset 0 0 30px #ff880020}
    33%{border-color:#ffff00;box-shadow:0 0 40px #ffff00,0 0 80px #ffff0060,inset 0 0 30px #ffff0020}
    50%{border-color:#00ff00;box-shadow:0 0 40px #00ff00,0 0 80px #00ff0060,inset 0 0 30px #00ff0020}
    66%{border-color:#00ffff;box-shadow:0 0 40px #00ffff,0 0 80px #00ffff60,inset 0 0 30px #00ffff20}
    83%{border-color:#ff00ff;box-shadow:0 0 40px #ff00ff,0 0 80px #ff00ff60,inset 0 0 30px #ff00ff20}
    100%{border-color:#ff0000;box-shadow:0 0 40px #ff0000,0 0 80px #ff000060,inset 0 0 30px #ff000020}
  }
  @keyframes marqueeLeft {
    0%{transform:translateX(100vw)}100%{transform:translateX(-100vw)}
  }
  @keyframes marqueeRight {
    0%{transform:translateX(-100vw)}100%{transform:translateX(100vw)}
  }
  @keyframes spin {
    0%{transform:rotate(0deg) scale(1)}
    50%{transform:rotate(180deg) scale(1.5)}
    100%{transform:rotate(360deg) scale(1)}
  }
  @keyframes wobble {
    0%,100%{transform:skewX(0deg) skewY(0deg)}
    20%{transform:skewX(8deg) skewY(3deg)}
    40%{transform:skewX(-8deg) skewY(-3deg)}
    60%{transform:skewX(5deg) skewY(2deg)}
    80%{transform:skewX(-5deg) skewY(-2deg)}
  }
  @keyframes textShadowRainbow {
    0%{text-shadow:6px 6px 0 #00ffff,-6px -6px 0 #ff00ff,0 0 40px #ff0000}
    25%{text-shadow:6px 6px 0 #ff00ff,-6px -6px 0 #ffff00,0 0 40px #00ff00}
    50%{text-shadow:6px 6px 0 #ffff00,-6px -6px 0 #00ffff,0 0 40px #0000ff}
    75%{text-shadow:6px 6px 0 #00ff00,-6px -6px 0 #ff0000,0 0 40px #ff00ff}
    100%{text-shadow:6px 6px 0 #00ffff,-6px -6px 0 #ff00ff,0 0 40px #ff0000}
  }
</style>
