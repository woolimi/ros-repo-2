<section class="flex flex-col">
  <h2 class="text-em-xl font-black mt-0 mb-6 text-center w-full">참고자료 3: <span style="color:#FBBF24">Kalman Filter</span></h2>

  <div class="flex gap-4 w-full flex-1 min-h-0">

    <!-- 왼쪽 -->
    <div class="flex-1 flex flex-col gap-3 justify-center">

      <div class="rounded-2xl px-4 py-3" style="background:#0A1929;border:1px solid #FBBF24">
        <p class="text-em-2xs font-bold m-0 mb-1" style="color:#FBBF24">핵심 아이디어</p>
        <p class="text-em-2xs leading-relaxed m-0" style="color:#8BACC8">
          과거의 움직임 패턴을 기반으로 <strong style="color:#E2E8F0">다음 위치를 예측</strong>하고,<br>
          새로 들어온 측정값과 합쳐 더 정확한 위치를 추정합니다.
        </p>
      </div>

      <div class="rounded-2xl px-4 py-3" style="background:#0A1929;border:1px solid #1E3A5A">
        <p class="text-em-2xs font-bold m-0 mb-2" style="color:#7BA5C8">2단계 동작</p>
        <div class="flex flex-col gap-2">
          <div class="rounded-xl px-3 py-2 flex items-start gap-2" style="background:#071320">
            <span class="text-em-2xs font-black shrink-0" style="color:#FBBF24">1</span>
            <div>
              <p class="text-em-3xs font-bold m-0" style="color:#E2E8F0">Predict (예측)</p>
              <p class="text-em-3xs m-0 mt-0.5" style="color:#8BACC8">이전 상태(위치·속도)를 이용해 현재 위치를 미리 추정</p>
            </div>
          </div>
          <div class="rounded-xl px-3 py-2 flex items-start gap-2" style="background:#071320">
            <span class="text-em-2xs font-black shrink-0" style="color:#FBBF24">2</span>
            <div>
              <p class="text-em-3xs font-bold m-0" style="color:#E2E8F0">Update (보정)</p>
              <p class="text-em-3xs m-0 mt-0.5" style="color:#8BACC8">실제 감지된 bbox와 예측값을 가중 평균해 오차를 줄임</p>
            </div>
          </div>
        </div>
      </div>

      <div class="rounded-2xl px-4 py-3" style="background:#0A1929;border:1px solid #1E3A5A">
        <p class="text-em-2xs font-bold m-0 mb-1" style="color:#7BA5C8">ByteTracker에서의 역할</p>
        <p class="text-em-3xs m-0" style="color:#8BACC8">
          인형이 일시적으로 가려지거나 감지 실패해도 <strong style="color:#E2E8F0">트랙을 끊지 않고 유지</strong>할 수 있게 해줍니다.
        </p>
      </div>

    </div>

    <!-- 오른쪽: 시각화 -->
    <div class="flex-1 flex flex-col justify-center items-center rounded-2xl px-5 py-5" style="background:#0A1929;border:1px solid #1E3A5A">
      <p class="text-em-3xs font-bold uppercase tracking-wider m-0 mb-4" style="color:#7BA5C8">예측 → 보정 흐름</p>
      <svg viewBox="0 0 300 240" width="100%" style="max-height:260px">
        <!-- 타임라인 -->
        <line x1="20" y1="120" x2="280" y2="120" stroke="#1E3A5A" stroke-width="1.5"/>

        <!-- 프레임 t-1 -->
        <circle cx="60" cy="120" r="6" fill="#FBBF24"/>
        <text x="60" y="145" text-anchor="middle" fill="#7BA5C8" font-size="9">t-1</text>
        <text x="60" y="156" text-anchor="middle" fill="#7BA5C8" font-size="8">실제 감지</text>

        <!-- 예측 화살표 -->
        <line x1="66" y1="120" x2="140" y2="80" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="4,3"/>
        <polygon points="140,80 132,85 137,91" fill="#FBBF24"/>
        <text x="110" y="72" fill="#FBBF24" font-size="9" font-weight="bold">Predict</text>
        <circle cx="150" cy="78" r="5" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="3,2"/>
        <text x="150" y="66" text-anchor="middle" fill="#FBBF24" font-size="8">예측</text>

        <!-- 실제 감지 프레임 t -->
        <circle cx="150" cy="120" r="6" fill="#38BDF8"/>
        <text x="150" y="145" text-anchor="middle" fill="#7BA5C8" font-size="9">t</text>
        <text x="150" y="156" text-anchor="middle" fill="#7BA5C8" font-size="8">실제 감지</text>

        <!-- Update 화살표 -->
        <line x1="150" y1="114" x2="150" y2="85" stroke="#38BDF8" stroke-width="1.5"/>
        <polygon points="150,85 146,93 154,93" fill="#38BDF8"/>

        <!-- 보정 결과 -->
        <circle cx="150" cy="100" r="5" fill="#4ADE80"/>
        <text x="168" y="103" fill="#4ADE80" font-size="9" font-weight="bold">Update</text>
        <text x="168" y="115" fill="#4ADE80" font-size="8">가중 평균</text>

        <!-- 프레임 t+1 예측 -->
        <line x1="156" y1="100" x2="225" y2="90" stroke="#4ADE80" stroke-width="1.5" stroke-dasharray="4,3"/>
        <circle cx="235" cy="89" r="5" fill="none" stroke="#4ADE80" stroke-width="1.5" stroke-dasharray="3,2"/>
        <text x="235" y="78" text-anchor="middle" fill="#4ADE80" font-size="8">다음 예측</text>
        <text x="235" y="145" text-anchor="middle" fill="#7BA5C8" font-size="9">t+1</text>

        <!-- 범례 -->
        <circle cx="30" cy="195" r="4" fill="#FBBF24"/>
        <text x="40" y="199" fill="#7BA5C8" font-size="9">실제 감지값</text>
        <circle cx="30" cy="213" r="4" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="3,2"/>
        <text x="40" y="217" fill="#7BA5C8" font-size="9">예측값</text>
        <circle cx="130" cy="195" r="4" fill="#4ADE80"/>
        <text x="140" y="199" fill="#7BA5C8" font-size="9">보정된 추정값</text>
      </svg>
    </div>

  </div>
</section>
