services:
  pg:
    image: pgvector/pgvector:pg17
    container_name: shoppinkki_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: shoppinkki
      POSTGRES_USER: shoppinkki
      POSTGRES_PASSWORD: shoppinkki
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./scripts/db/seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "shoppinkki", "-d", "shoppinkki"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
