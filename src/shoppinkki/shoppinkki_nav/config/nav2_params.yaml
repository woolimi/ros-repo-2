# Nav2 parameters for ShopPinkki miniature shop
# Adapted from pinky_navigation/params — max_vel_x adjusted to 0.3
bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    default_bt_xml_filename: navigate_w_replanning_and_recovery.xml

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    FollowPath:
      plugin: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController
      desired_linear_vel: 0.2
      max_linear_accel: 2.5
      max_linear_decel: 2.5
      lookahead_dist: 0.3
      max_allowed_time_to_collision_with_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.05
      max_angular_accel: 3.2
      max_robot_pose_search_dist: 10.0

velocity_smoother:
  ros__parameters:
    max_velocity: [0.3, 0.0, 1.0]
    min_velocity: [-0.15, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
